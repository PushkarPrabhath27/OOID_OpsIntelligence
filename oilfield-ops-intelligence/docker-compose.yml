version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ooid_postgres
    restart: always
    environment:
      POSTGRES_DB: ooid_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ooid_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: ooid_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ooid.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  streamlit_app:
    build: .
    container_name: ooid_dashboard
    restart: always
    ports:
      - "8501:8501"
    environment:
      - EIA_API_KEY=${EIA_API_KEY}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ooid_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
